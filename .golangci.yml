version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - gosec
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - modernize
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    modernize:
      # newexpr suggests `new(x)` for `gh.Ptr(x)` / `gitea.OptionalString(x)` etc.,
      # but `new()` takes a type, not a value, so the rewrite is invalid for the
      # SDK helpers we use (gh.Ptr, etc).
      disable:
        - newexpr
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - lll
        path: internal/*
      - linters:
          - dupl
        path: (test|cmd)/*
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
